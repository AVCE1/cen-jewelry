<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>水贝珠宝平台</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:26px;
}

.login{
text-align:center;
margin:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.product{
background:white;
width:260px;
margin:10px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.product img{
width:200px;
}

button{
padding:8px;
margin:4px;
background:gold;
border:none;
border-radius:5px;
cursor:pointer;
}

.admin{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

.orders{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">
水贝珠宝平台
</div>


<div class="login">

<input id="user" placeholder="输入客户名称">

<button onclick="login()">登录</button>

<p id="loginStatus"></p>

</div>


<div class="products" id="productList"></div>


<div class="orders">

<h2>订单记录</h2>

<div id="orderList"></div>

</div>


<div class="admin">

<h2>厂家后台</h2>

<input id="pname" placeholder="产品名称">
<input id="pfactory" placeholder="厂家">
<input id="pweight" placeholder="重量">

<button onclick="addProduct()">添加产品</button>

</div>


<script>

let user=""

let products=[

{
name:"蝴蝶结黄金项链",
factory:"YZZ珠宝",
weight:"20g",
img:"https://images.unsplash.com/photo-1617038260897-41a1f14a9c9c",
likes:0,
fav:0
},

{
name:"黄金手镯",
factory:"粤至尊",
weight:"35g",
img:"https://images.unsplash.com/photo-1605100804763-247f67b3557e",
likes:0,
fav:0
},

{
name:"5G黄金吊坠",
factory:"丽安珠宝",
weight:"10g",
img:"https://images.unsplash.com/photo-1515562141207-7a88fb7ce338",
likes:0,
fav:0
}

]

let orders=[]

function login(){

user=document.getElementById("user").value

document.getElementById("loginStatus").innerText="欢迎 "+user

}


function renderProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>厂家:${p.factory}</p>

<p>重量:${p.weight}</p>

<p>点赞:${p.likes} 收藏:${p.fav}</p>

<button onclick="like(${i})">点赞</button>

<button onclick="fav(${i})">收藏</button>

<button onclick="order(${i})">下单</button>

</div>

`

})

document.getElementById("productList").innerHTML=html

}


function like(i){

products[i].likes++

renderProducts()

}

function fav(i){

products[i].fav++

renderProducts()

}


function order(i){

if(user==""){

alert("请先登录")

return

}

let id="ORD"+Date.now()

orders.push({

id:id,

product:products[i].name,

user:user

})

renderOrders()

alert("下单成功 订单:"+id)

}


function renderOrders(){

let html=""

orders.forEach(o=>{

html+=`<p>${o.id} - ${o.product} - ${o.user}</p>`

})

document.getElementById("orderList").innerHTML=html

}


function addProduct(){

let name=document.getElementById("pname").value

let factory=document.getElementById("pfactory").value

let weight=document.getElementById("pweight").value

products.push({

name:name,
factory:factory,
weight:weight,
img:"https://images.unsplash.com/photo-1617038260897-41a1f14a9c9c",
likes:0,
fav:0

})

renderProducts()

}


renderProducts()

</script>


</body>
</html>
